#
# CI for this repository — library release (pack + optional publish).
#
# Packs consumable open libraries, optionally publishes to nuget.org / npmjs,
# and can create a GitHub Release.
#
# Operator secrets (repo Settings → Secrets → Actions):
#   NUGET_API_KEY   — nuget.org API key (optional until first publish)
#   NPM_TOKEN       — npmjs automation token (optional until first publish)
#
# You do NOT create a NuGet/npm "project" per package in advance for public
# open-source packages: first `dotnet nuget push` / `npm publish` creates the
# package ID on the registry (scoped npm packages require org/user to exist:
# @dcsv-io must already exist on npmjs — one org, not one resource per package).

name: Release libraries

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to nuget.org + npmjs (requires secrets)"
        type: boolean
        required: true
        default: false
      create_github_release:
        description: "Create a GitHub Release and attach pack artifacts"
        type: boolean
        required: true
        default: false
      tag:
        description: "Release tag (default: libs-YYYY.MM.DD)"
        type: string
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release-libs:
    name: Pack (+ optional publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: pnpm/action-setup@v4

      - name: Derive tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "value=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=libs-$(date +%Y.%m.%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: pnpm install (release-runner + public packages)
        run: pnpm install --filter "release-runner..." --filter "./packages/typescript/**..." --filter "ts-codegen..."

      - name: Build release-runner + public TS packages
        run: |
          pnpm --filter "release-runner^..." build
          pnpm --filter "./packages/typescript/**" -r build

      - name: List consumable inventory
        run: pnpm --filter release-runner exec tsx src/cli.ts --list

      - name: Pack .NET consumables (solution packable projects)
        run: |
          set -euo pipefail
          mkdir -p bundle/nuget
          # Pack via public solution graph — packable projects emit nupkgs.
          dotnet pack D2.Public.slnx --configuration Release --output bundle/nuget -p:ContinuousIntegrationBuild=true

      - name: Pack TS consumables
        run: |
          set -euo pipefail
          mkdir -p bundle/npm
          pnpm --filter "./packages/typescript/**" -r exec pnpm pack --pack-destination "$GITHUB_WORKSPACE/bundle/npm" || true
          # Prefer filter-pack for workspace packages that support it:
          for pkg in $(pnpm --filter "./packages/typescript/**" -r list --json | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{JSON.parse(d).forEach(p=>p.name&&console.log(p.name))})"); do
            pnpm --filter "$pkg" pack --pack-destination bundle/npm 2>/dev/null || true
          done
          ls -la bundle/npm || true

      - name: Upload pack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: d2-libs-${{ steps.tag.outputs.value }}
          path: bundle/

      # Publish policy (no inter-package sleep — only 429 uses expo backoff):
      #   1) One bulk inventory fetch → in-memory id@version set (short-circuit
      #      skip — never hit publish API for packages we KNOW already exist).
      #   2) Rate-limit retries only: sleep 1,2,4,8,16,32s then FAIL (7 attempts).
      #   3) Safety backstop: NuGet --skip-duplicate; npm EPUBLISHCONFLICT skip
      #      (inventory is latest-version search only — weird races still covered).
      - name: Publish to nuget.org
        if: ${{ inputs.publish }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "::error::NUGET_API_KEY secret missing"
            exit 1
          fi
          shopt -s nullglob

          # Fixed expo: after attempt N fails → sleep schedule[N]; attempt 7 fail → FAIL
          rate_limit_backoff_sec() {
            case "$1" in
              1) echo 1 ;;
              2) echo 2 ;;
              3) echo 4 ;;
              4) echo 8 ;;
              5) echo 16 ;;
              6) echo 32 ;;
              *) echo "" ;;
            esac
          }
          max_attempts=7

          echo "Fetching NuGet inventory (latest-version search)…"
          inv_file="$(mktemp)"
          curl -fsSL \
            "https://azuresearch-usnc.nuget.org/query?q=DcsvIo.D2&prerelease=true&take=100" \
            -H "Accept: application/json" \
            -o "$inv_file"
          # keysLower: one id@version per line (lowercase id)
          node -e '
            const fs = require("fs");
            const j = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            const data = Array.isArray(j.data) ? j.data : [];
            for (const row of data) {
              if (!row?.id || !row?.version) continue;
              console.log(String(row.id).trim().toLowerCase() + "@" + String(row.version).trim());
            }
            console.error("inventory totalHits=" + (j.totalHits ?? data.length) + " keys=" + data.filter(r => r?.id && r?.version).length);
          ' "$inv_file" > "${inv_file}.keys"
          inv_count="$(wc -l < "${inv_file}.keys" | tr -d " ")"
          echo "NuGet inventory keys: ${inv_count}"

          for nupkg in bundle/nuget/*.nupkg; do
            case "$nupkg" in
              *.symbols.nupkg) continue ;;
            esac

            # id + version from embedded nuspec (nupkg is a zip)
            meta="$(unzip -p "$nupkg" "*.nuspec" 2>/dev/null || true)"
            if [ -z "$meta" ]; then
              echo "::error::could not read nuspec from $nupkg"
              exit 1
            fi
            id="$(printf "%s" "$meta" | sed -n "s/.*<id>\\([^<]*\\)<\\/id>.*/\\1/p" | head -1 | tr -d "\r")"
            version="$(printf "%s" "$meta" | sed -n "s/.*<version>\\([^<]*\\)<\\/version>.*/\\1/p" | head -1 | tr -d "\r")"
            if [ -z "$id" ] || [ -z "$version" ]; then
              echo "::error::could not parse id/version from nuspec in $nupkg"
              exit 1
            fi
            key="$(printf "%s" "$id" | tr "[:upper:]" "[:lower:]")@${version}"

            if grep -Fqx "$key" "${inv_file}.keys"; then
              echo "Skip (inventory short-circuit): ${id}@${version}"
              continue
            fi

            attempt=1
            while true; do
              echo "Pushing $nupkg (${id}@${version}) attempt ${attempt}/${max_attempts}"
              set +e
              out="$(dotnet nuget push "$nupkg" \
                --api-key "$NUGET_API_KEY" \
                --source https://api.nuget.org/v3/index.json \
                --skip-duplicate 2>&1)"
              code=$?
              set -e
              printf "%s\n" "$out"
              if [ "$code" -eq 0 ]; then
                # Keep inventory warm for later packages in this run (same version race)
                printf "%s\n" "$key" >> "${inv_file}.keys"
                break
              fi
              if printf "%s\n" "$out" | grep -qiE "429|Too Many Requests|rate limit|try again later"; then
                backoff="$(rate_limit_backoff_sec "$attempt")"
                if [ -z "$backoff" ]; then
                  echo "::error::nuget.org rate limited after ${max_attempts} attempts (1,2,4,8,16,32 then FAIL): $nupkg"
                  exit 1
                fi
                echo "Rate limited — backing off ${backoff}s (then retry)…"
                sleep "$backoff"
                attempt=$((attempt + 1))
                continue
              fi
              echo "::error::dotnet nuget push failed: $nupkg (exit $code)"
              exit "$code"
            done
          done

      - name: Publish to npmjs
        if: ${{ inputs.publish }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret missing"
            exit 1
          fi
          shopt -s nullglob

          rate_limit_backoff_sec() {
            case "$1" in
              1) echo 1 ;;
              2) echo 2 ;;
              3) echo 4 ;;
              4) echo 8 ;;
              5) echo 16 ;;
              6) echo 32 ;;
              *) echo "" ;;
            esac
          }
          max_attempts=7

          echo "Fetching npm inventory (search text=dcsv, filter @dcsv-io/)…"
          inv_file="$(mktemp)"
          curl -fsSL \
            "https://registry.npmjs.org/-/v1/search?text=dcsv&size=250" \
            -H "Accept: application/json" \
            -o "$inv_file"
          node -e '
            const fs = require("fs");
            const j = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            const objects = Array.isArray(j.objects) ? j.objects : [];
            let matched = 0;
            for (const obj of objects) {
              const name = obj?.package?.name;
              const version = obj?.package?.version;
              if (!name || !version) continue;
              if (!name.startsWith("@dcsv-io/")) continue;
              console.log(name + "@" + version);
              matched++;
            }
            console.error("inventory total=" + (j.total ?? objects.length) + " matched=" + matched);
          ' "$inv_file" > "${inv_file}.keys"
          inv_count="$(wc -l < "${inv_file}.keys" | tr -d " ")"
          echo "npm inventory keys (@dcsv-io/* latest): ${inv_count}"

          for tgz in bundle/npm/*.tgz; do
            name="$(tar -xOf "$tgz" package/package.json | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).name))")"
            version="$(tar -xOf "$tgz" package/package.json | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))")"
            id="${name}@${version}"

            # In-mem inventory short-circuit — no per-package npm view (that was a GET storm)
            if grep -Fqx "$id" "${inv_file}.keys"; then
              echo "Skip (inventory short-circuit): $id"
              continue
            fi

            attempt=1
            while true; do
              echo "Publishing $tgz ($id) attempt ${attempt}/${max_attempts}"
              set +e
              out="$(npm publish "$tgz" --access public 2>&1)"
              code=$?
              set -e
              printf "%s\n" "$out"
              if [ "$code" -eq 0 ]; then
                printf "%s\n" "$id" >> "${inv_file}.keys"
                break
              fi
              # Safety backstop: version already published (race / inventory lag / weird)
              if printf "%s\n" "$out" | grep -qiE "cannot publish over existing|EPUBLISHCONFLICT|previously published|403 Forbidden.*cannot publish"; then
                echo "Skip (already published / conflict backstop): $id"
                printf "%s\n" "$id" >> "${inv_file}.keys"
                break
              fi
              if printf "%s\n" "$out" | grep -qiE "E429|Too Many Requests|rate limit"; then
                backoff="$(rate_limit_backoff_sec "$attempt")"
                if [ -z "$backoff" ]; then
                  echo "::error::npm rate limited after ${max_attempts} attempts (1,2,4,8,16,32 then FAIL): $id"
                  exit 1
                fi
                echo "429 — backing off ${backoff}s (then retry)…"
                sleep "$backoff"
                attempt=$((attempt + 1))
                continue
              fi
              echo "::error::npm publish failed: $id (exit $code)"
              exit "$code"
            done
          done

      - name: GitHub Release
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.value }}"
          gh release create "$TAG" bundle/nuget/* bundle/npm/* \
            --title "$TAG" \
            --notes "Public library pack from D2-Public @ ${GITHUB_SHA}"
